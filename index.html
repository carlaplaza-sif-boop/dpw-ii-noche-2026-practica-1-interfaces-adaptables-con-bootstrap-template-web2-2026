         /* Estilos personalizados y creativos */
         body {

         /* Barra lateral izquierda */
         .sidebar {
             background: linear-gradient(180deg, #2d3748, #4a5568);

             text-align: center;

             font-weight: 500;
             width: 80%;

         }
         .col1 { background-color: #e53e3e; }

             font-size: 2.5rem;

             margin-bottom: 1rem;
         }
         .desc-text {

             font-size: 1.3rem;
             line-height: 1.6;
         }
         /* Tarjetas de contenido */
         .card-section {
             padding: 0 2rem 2rem;
         }
         .custom-card {

             border-radius: 10px;

             padding: 1.5rem;
             margin-bottom: 1.5rem;
             border-left: 5px solid #805ad5;
         }
         .custom-card h5 {
             color: #2d3748;
             font-weight: bold;
             margin-bottom: 0.8rem;
         }
         .custom-card p {
             color: #718096;
             margin-bottom: 1rem;
         }
         .read-more-btn {
             background-color: #805ad5;
             color: white;
             border: none;
             padding: 0.5rem 1rem;
             border-radius: 5px;
             transition: background-color 0.3s ease;
         }
         .read-more-btn:hover {

         }
     </style>
 </head>
